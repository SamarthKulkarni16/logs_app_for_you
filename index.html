<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="favicon-48x48.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
<title>Daily Logs — one page, every day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#13151a;
    --bg-lower:#0e1014;
    --text-primary:#e9eaed;
    --text-muted:#6b7079;
    --text-faint:#3a3f48;
    --sage:#8b9d83;
    --hairline:#22252c;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body{
    height:100%;
    margin:0;
    padding:0;
    overflow:hidden;
    background:var(--bg);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  body{
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
  }

  /* ---------- TOP: app recreation ---------- */
  .app-screen{
    flex:1.15;
    min-height:0;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:max(7vh, calc(env(safe-area-inset-top) + 34px)) 6vw 2vh;
    position:relative;
  }

  .stage{
    width:100%;
    max-width:420px;
    position:relative;
    height:100%;
  }

  .view{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    opacity:0;
    transform:translateY(6px);
    transition:opacity 0.45s ease, transform 0.45s ease;
    pointer-events:none;
  }
  .view.visible{
    opacity:1;
    transform:translateY(0);
  }

  /* ---- write view ---- */
  .date-heading{
    font-family:'Source Serif 4', Georgia, serif;
    font-weight:600;
    font-size:clamp(1.4rem, 1.05rem + 1.4vw, 1.75rem);
    color:var(--text-primary);
    letter-spacing:-0.01em;
    line-height:1.15;
  }

  .time-label{
    font-size:0.7rem;
    font-weight:500;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin-top:0.35rem;
  }

  .entry-body{
    margin-top:1.5rem;
    font-size:clamp(0.92rem, 0.83rem + 0.35vw, 1.0rem);
    line-height:1.65;
    color:var(--text-primary);
    min-height:6em;
    font-weight:400;
  }

  .cursor{
    display:inline-block;
    width:2px;
    height:1.1em;
    background:var(--text-primary);
    margin-left:1px;
    vertical-align:-0.18em;
    animation:blink 1s step-start infinite;
  }
  .cursor.hidden{ display:none; }
  @keyframes blink{ 50%{ opacity:0; } }

  .status-row{
    margin-top:1.5rem;
    display:flex;
    align-items:center;
    gap:0.5rem;
    height:1.2rem;
  }

  .status-dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--text-muted);
    flex-shrink:0;
    transition:background-color 0.4s ease;
  }
  .status-dot.sage{ background:var(--sage); }
  .status-dot.pulse{ animation:dotpulse 1.1s ease-in-out infinite; }
  @keyframes dotpulse{
    0%, 100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.35; transform:scale(0.78); }
  }

  .status-text{
    font-size:0.72rem;
    font-weight:500;
    letter-spacing:0.04em;
    color:var(--text-muted);
    transition:color 0.4s ease;
  }
  .status-text.sage{ color:var(--sage); }

  /* ---- grid view ---- */
  .grid-month-label{
    font-family:'Source Serif 4', Georgia, serif;
    font-weight:600;
    font-size:clamp(1.2rem, 0.95rem + 1vw, 1.45rem);
    color:var(--text-primary);
    letter-spacing:-0.01em;
    margin-bottom:1.4rem;
  }

  .weekday-row{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    margin-bottom:0.5rem;
  }
  .weekday-row span{
    font-size:0.6rem;
    font-weight:500;
    color:var(--text-faint);
    text-align:center;
    letter-spacing:0.04em;
  }

  .day-grid{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    row-gap:0.8rem;
  }

  .day-cell{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0.3rem;
  }

  .day-dot-wrap{
    width:18px;
    height:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  .day-dot{
    width:4px;
    height:4px;
    border-radius:50%;
    background:var(--hairline);
    transition:background-color 0.35s ease, transform 0.35s ease;
  }
  .day-dot.written{
    background:var(--sage);
    width:8px;
    height:8px;
  }
  .day-dot.tapped{
    transform:scale(1.5);
  }

  .today-ring{
    position:absolute;
    inset:0;
    border-radius:50%;
    border:1.2px solid transparent;
    transition:border-color 0.4s ease;
  }
  .today-ring.active{ border-color:rgba(139,157,131,0.5); }

  .tap-ring{
    position:absolute;
    inset:-3px;
    border-radius:50%;
    border:1.2px solid var(--sage);
    opacity:0;
    transform:scale(0.6);
  }
  .tap-ring.pulsing{
    animation:tapPulse 0.6s ease-out;
  }
  @keyframes tapPulse{
    0%{ opacity:0.9; transform:scale(0.6); }
    100%{ opacity:0; transform:scale(1.6); }
  }

  .day-num{
    font-size:0.56rem;
    color:var(--text-faint);
  }

  /* ---- day detail view ---- */
  .detail-sub{
    font-size:0.68rem;
    font-weight:500;
    letter-spacing:0.04em;
    color:var(--text-muted);
    margin-top:0.3rem;
  }

  .detail-body{
    margin-top:1.7rem;
    font-size:clamp(0.9rem, 0.82rem + 0.3vw, 0.98rem);
    line-height:1.65;
    color:var(--text-primary);
    opacity:0;
    transition:opacity 0.6s ease;
  }
  .detail-body.shown{ opacity:1; }

  /* ---------- fade seam ---------- */
  .seam{
    flex:0 0 auto;
    height:14vh;
    background:linear-gradient(to bottom, var(--bg) 0%, var(--bg-lower) 100%);
    position:relative;
  }

  /* ---------- BOTTOM: download ---------- */
  .download-section{
    flex:0.85;
    min-height:0;
    background:var(--bg-lower);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    padding:2vh 6vw 4vh;
  }

  .download-btn{
    appearance:none;
    border:none;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:0.65rem;
    background:var(--text-primary);
    color:var(--bg-lower);
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:clamp(0.95rem, 0.85rem + 0.4vw, 1.05rem);
    padding:0.95rem 1.9rem;
    border-radius:8px;
    cursor:pointer;
    letter-spacing:-0.01em;
    transition:transform 0.15s ease, background-color 0.2s ease;
  }

  .download-btn:hover{
    background:#ffffff;
    transform:translateY(-1px);
  }
  .download-btn:active{
    transform:translateY(0px) scale(0.98);
  }

  .download-btn svg{
    width:16px;
    height:16px;
    flex-shrink:0;
  }

  @media (max-height: 620px){
    .app-screen{ padding-top:max(5vh, calc(env(safe-area-inset-top) + 22px)); }
    .seam{ height:8vh; }
    .entry-body{ min-height:4.5em; margin-top:1rem; }
    .status-row{ margin-top:1rem; }
  }
</style>
</head>
<body>

  <div class="app-screen">
    <div class="stage">

      <div class="view" id="viewWrite">
        <div class="date-heading" id="dateHeading">—</div>
        <div class="time-label" id="timeLabel">—</div>
        <div class="entry-body" id="entryBody"><span class="cursor" id="cursor"></span></div>
        <div class="status-row">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-text" id="statusText"></span>
        </div>
      </div>

      <div class="view" id="viewGrid">
        <div class="grid-month-label" id="monthLabel">—</div>
        <div class="weekday-row">
          <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
        </div>
        <div class="day-grid" id="dayGrid"></div>
      </div>

      <div class="view" id="viewDetail">
        <div class="date-heading" id="detailDate">—</div>
        <div class="detail-sub">tap anywhere to close</div>
        <div class="detail-body" id="detailBody"></div>
      </div>

    </div>
  </div>

  <div class="seam"></div>

  <div class="download-section">
    <a class="download-btn" id="downloadBtn" href="https://github.com/SamarthKulkarni16/logs_app_for_you/releases/latest/download/daily-logs.apk" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v12"></path>
        <path d="M7 10l5 5 5-5"></path>
        <path d="M5 21h14"></path>
      </svg>
      Download
    </a>
  </div>

<script>
  // Ten distinct daily-log style entries, short "main actions" phrasing —
  // not philosophical quotes. Cycled through (starting at a random point
  // each page load) so repeat visitors see different content.
  const entries = [
    "Woke up early, went for a 5k run. Fixed the OAuth bug that was blocking the build. Read a bit before bed.",
    "Hit a new PR on deadlifts today. Recorded two voiceovers for the pipeline. Called home in the evening.",
    "Debugged the sync issue for three hours, finally found it. Skipped lunch, regretted it. Watched the sunset.",
    "Wrote the first draft of the new chapter. Went for a walk to clear my head. Slept early for once.",
    "Meeting ran long, didn't get much coding done. Pushed through anyway and shipped the CI fix.",
    "Rest day from lifting. Spent the morning reading, afternoon on the pipeline. Good catch-up with an old friend.",
    "Recorded three video scripts back to back. Voice was tired by the end. Too lazy to cook, ordered food.",
    "Fixed the Gemini integration bug. Took a break to play guitar for a bit. Early night, behind on sleep.",
    "Long run this morning, legs are sore now. Reviewed pull requests all afternoon. Journaled more than usual.",
    "Quiet day. Cleaned up the notes site's sync bug. Cooked dinner from scratch for the first time in weeks."
  ];

  const dateHeading = document.getElementById('dateHeading');
  const timeLabel = document.getElementById('timeLabel');
  const entryBody = document.getElementById('entryBody');
  const cursor = document.getElementById('cursor');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  const viewWrite = document.getElementById('viewWrite');
  const viewGrid = document.getElementById('viewGrid');
  const viewDetail = document.getElementById('viewDetail');

  const monthLabel = document.getElementById('monthLabel');
  const dayGrid = document.getElementById('dayGrid');

  const detailDate = document.getElementById('detailDate');
  const detailBody = document.getElementById('detailBody');

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  function showView(view){
    [viewWrite, viewGrid, viewDetail].forEach(v => v.classList.toggle('visible', v === view));
  }

  function updateClock(){
    const now = new Date();
    dateHeading.textContent = now.toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' });
    let h = now.getHours();
    const m = now.getMinutes().toString().padStart(2,'0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if (h === 0) h = 12;
    timeLabel.textContent = `${h}:${m} ${ampm}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  function setStatus(text, opts = {}){
    statusText.textContent = text;
    statusDot.classList.toggle('sage', !!opts.sage);
    statusText.classList.toggle('sage', !!opts.sage);
    statusDot.classList.toggle('pulse', !!opts.pulse);
  }

  async function typeInto(el, text){
    el.textContent = '';
    el.appendChild(cursor);
    cursor.classList.remove('hidden');
    for (let i = 0; i < text.length; i++){
      el.textContent = text.slice(0, i + 1);
      el.appendChild(cursor);
      const ch = text[i];
      let delay = 42 + Math.random() * 48;
      if (ch === ' ') delay *= 0.6;
      if (ch === ',') delay += 160;
      if (ch === '.') delay += 260;
      await sleep(delay);
    }
    cursor.classList.add('hidden');
  }

  // ---- month grid construction (fixed dot sizes, no growth) ----
  const now0 = new Date();
  const daysInMonth = new Date(now0.getFullYear(), now0.getMonth() + 1, 0).getDate();
  const firstOfMonth = new Date(now0.getFullYear(), now0.getMonth(), 1);
  let leading = firstOfMonth.getDay() - 1;
  if (leading < 0) leading = 6;
  const todayDate = now0.getDate();

  monthLabel.textContent = now0.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });

  const cellDefs = [];
  for (let i = 0; i < leading; i++) cellDefs.push(null);
  for (let d = 1; d <= daysInMonth; d++) cellDefs.push(d);

  dayGrid.innerHTML = '';
  const dotByDay = {};

  cellDefs.forEach((day) => {
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (day === null) {
      cell.style.visibility = 'hidden';
      dayGrid.appendChild(cell);
      return;
    }
    const wrap = document.createElement('div');
    wrap.className = 'day-dot-wrap';

    const ring = document.createElement('div');
    ring.className = 'today-ring' + (day === todayDate ? ' active' : '');

    const tapRing = document.createElement('div');
    tapRing.className = 'tap-ring';

    const dot = document.createElement('div');
    dot.className = 'day-dot' + (day <= todayDate ? ' written' : '');

    wrap.appendChild(ring);
    wrap.appendChild(tapRing);
    wrap.appendChild(dot);

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = day;

    cell.appendChild(wrap);
    cell.appendChild(num);
    dayGrid.appendChild(cell);

    dotByDay[day] = { dot, tapRing };
  });

  function dateLabelFor(day){
    const d = new Date(now0.getFullYear(), now0.getMonth(), day);
    return d.toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' });
  }

  // choose a handful of past written days to tap across loops, distinct
  // from "today" — falls back gracefully early in the month
  const pastCandidates = [];
  for (let d = 1; d < todayDate; d++) pastCandidates.push(d);
  if (pastCandidates.length === 0) pastCandidates.push(todayDate);

  let entryIndex = Math.floor(Math.random() * entries.length);
  let pastCursor = Math.floor(Math.random() * pastCandidates.length);

  async function mainLoop(){
    while (true){
      // ---- phase 1: write today's entry ----
      showView(viewWrite);
      setStatus('');
      await sleep(500);

      const text = entries[entryIndex % entries.length];
      entryIndex++;
      await typeInto(entryBody, text);

      await sleep(700);
      setStatus('saving…');
      await sleep(500);
      setStatus('saved on device');
      await sleep(700);
      setStatus('syncing…', { sage:true, pulse:true });
      await sleep(800);
      setStatus('synced', { sage:true });
      await sleep(1600);

      // ---- phase 2: open the month grid ----
      showView(viewGrid);
      await sleep(1300);

      // ---- phase 3: tap a past day ----
      const pastDay = pastCandidates[pastCursor % pastCandidates.length];
      pastCursor++;
      const target = dotByDay[pastDay];
      if (target){
        target.tapRing.classList.remove('pulsing');
        target.dot.classList.remove('tapped');
        void target.tapRing.offsetWidth; // restart animation
        target.tapRing.classList.add('pulsing');
        target.dot.classList.add('tapped');
        await sleep(350);
        target.dot.classList.remove('tapped');
      }
      await sleep(450);

      // ---- phase 4: show that day's log, read-only ----
      const pastText = entries[(entryIndex + 3) % entries.length];
      detailDate.textContent = dateLabelFor(pastDay);
      detailBody.textContent = pastText;
      detailBody.classList.remove('shown');
      showView(viewDetail);
      await sleep(150);
      detailBody.classList.add('shown');

      // hold long enough to read
      const readTime = Math.max(2600, pastText.length * 32);
      await sleep(readTime);

      // ---- back to grid briefly, then next loop ----
      showView(viewGrid);
      await sleep(900);
    }
  }

  mainLoop();
</script>

</body>
</html>
