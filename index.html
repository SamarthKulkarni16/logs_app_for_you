<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Daily Logs — one page, every day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#13151a;
    --bg-lower:#0e1014;
    --text-primary:#e9eaed;
    --text-muted:#6b7079;
    --text-faint:#3a3f48;
    --sage:#8b9d83;
    --hairline:#22252c;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body{
    height:100%;
    margin:0;
    padding:0;
    overflow:hidden;
    background:var(--bg);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  body{
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
  }

  /* ---------- TOP: app recreation ---------- */
  .app-screen{
    flex:1.15;
    min-height:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:5vh 6vw 2vh;
    position:relative;
  }

  .grid-card{
    width:100%;
    max-width:400px;
    display:flex;
    flex-direction:column;
    gap:0;
  }

  .grid-month-label{
    font-family:'Source Serif 4', Georgia, serif;
    font-weight:600;
    font-size:clamp(1.3rem, 1.0rem + 1.2vw, 1.6rem);
    color:var(--text-primary);
    letter-spacing:-0.01em;
    margin-bottom:0.3rem;
  }

  .grid-sub{
    font-size:0.72rem;
    font-weight:500;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin-bottom:1.6rem;
  }

  .weekday-row{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    margin-bottom:0.5rem;
  }
  .weekday-row span{
    font-size:0.62rem;
    font-weight:500;
    color:var(--text-faint);
    text-align:center;
    letter-spacing:0.04em;
  }

  .day-grid{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    row-gap:0.85rem;
  }

  .day-cell{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0.32rem;
  }

  .day-dot-wrap{
    width:18px;
    height:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  .day-dot{
    width:5px;
    height:5px;
    border-radius:50%;
    background:var(--hairline);
    transition:width 0.5s cubic-bezier(.2,.8,.2,1), height 0.5s cubic-bezier(.2,.8,.2,1), background-color 0.5s ease;
  }
  .day-dot.written{ background:var(--sage); }

  .today-ring{
    position:absolute;
    inset:0;
    border-radius:50%;
    border:1.2px solid transparent;
    transition:border-color 0.4s ease;
  }
  .today-ring.active{ border-color:rgba(139,157,131,0.55); }

  .day-num{
    font-size:0.58rem;
    color:var(--text-faint);
  }

  .status-row{
    margin-top:1.7rem;
    display:flex;
    align-items:center;
    gap:0.5rem;
    height:1.2rem;
  }

  .status-dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--text-muted);
    flex-shrink:0;
    transition:background-color 0.4s ease;
  }
  .status-dot.sage{ background:var(--sage); }
  .status-dot.pulse{ animation:dotpulse 1.1s ease-in-out infinite; }
  @keyframes dotpulse{
    0%, 100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.35; transform:scale(0.78); }
  }

  .status-text{
    font-size:0.72rem;
    font-weight:500;
    letter-spacing:0.04em;
    color:var(--text-muted);
    transition:color 0.4s ease;
  }
  .status-text.sage{ color:var(--sage); }

  /* ---------- fade seam ---------- */
  .seam{
    flex:0 0 auto;
    height:14vh;
    background:linear-gradient(to bottom, var(--bg) 0%, var(--bg-lower) 100%);
    position:relative;
  }

  /* ---------- BOTTOM: download ---------- */
  .download-section{
    flex:0.85;
    min-height:0;
    background:var(--bg-lower);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:0.9rem;
    padding:2vh 6vw 4vh;
  }

  .download-kicker{
    font-size:0.68rem;
    font-weight:500;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--text-muted);
    text-align:center;
    max-width:320px;
    line-height:1.5;
  }

  .download-btn{
    appearance:none;
    border:none;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:0.65rem;
    background:var(--text-primary);
    color:var(--bg-lower);
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:clamp(0.95rem, 0.85rem + 0.4vw, 1.05rem);
    padding:0.95rem 1.9rem;
    border-radius:8px;
    cursor:pointer;
    letter-spacing:-0.01em;
    transition:transform 0.15s ease, background-color 0.2s ease;
  }

  .download-btn:hover{
    background:#ffffff;
    transform:translateY(-1px);
  }
  .download-btn:active{
    transform:translateY(0px) scale(0.98);
  }

  .download-btn svg{
    width:16px;
    height:16px;
    flex-shrink:0;
  }

  .download-sub{
    font-size:0.72rem;
    color:var(--text-faint);
    letter-spacing:0.02em;
  }

  @media (max-height: 560px){
    .app-screen{ padding:3vh 6vw 1vh; }
    .seam{ height:8vh; }
    .grid-card{ max-width:320px; }
    .status-row{ margin-top:1rem; }
  }
</style>
</head>
<body>

  <div class="app-screen">
    <div class="grid-card">
      <div class="grid-month-label" id="monthLabel">—</div>
      <div class="grid-sub">one page, every day</div>
      <div class="weekday-row">
        <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
      </div>
      <div class="day-grid" id="dayGrid"></div>
      <div class="status-row">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText"></span>
      </div>
    </div>
  </div>

  <div class="seam"></div>

  <div class="download-section">
    <div class="download-kicker">a dot a day — size grows with what you write, only the days you show up for are ever open</div>
    <a class="download-btn" id="downloadBtn" href="https://github.com/SamarthKulkarni16/logs_app_for_you/releases/latest/download/daily-logs.apk" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v12"></path>
        <path d="M7 10l5 5 5-5"></path>
        <path d="M5 21h14"></path>
      </svg>
      Download
    </a>
    <div class="download-sub">Android · signed release APK</div>
  </div>

<script>
  const monthLabel = document.getElementById('monthLabel');
  const dayGrid = document.getElementById('dayGrid');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  const now = new Date();
  monthLabel.textContent = now.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });

  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const firstOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
  // Monday-first leading blanks
  let leading = firstOfMonth.getDay() - 1;
  if (leading < 0) leading = 6;

  const cells = [];
  for (let i = 0; i < leading; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const todayDate = now.getDate();

  dayGrid.innerHTML = '';
  const dotEls = [];

  cells.forEach((day) => {
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (day === null) {
      cell.style.visibility = 'hidden';
      dayGrid.appendChild(cell);
      return;
    }
    const wrap = document.createElement('div');
    wrap.className = 'day-dot-wrap';

    const ring = document.createElement('div');
    ring.className = 'today-ring' + (day === todayDate ? ' active' : '');

    const dot = document.createElement('div');
    dot.className = 'day-dot';

    wrap.appendChild(ring);
    wrap.appendChild(dot);

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = day;

    cell.appendChild(wrap);
    cell.appendChild(num);
    dayGrid.appendChild(cell);

    if (day <= todayDate) dotEls.push({ dot, day });
  });

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  function setStatus(text, opts = {}){
    statusText.textContent = text;
    statusDot.classList.toggle('sage', !!opts.sage);
    statusText.classList.toggle('sage', !!opts.sage);
    statusDot.classList.toggle('pulse', !!opts.pulse);
  }

  // Deterministic-feeling pseudo-random word counts per day, so the
  // animation looks like a real month of uneven logging rather than a
  // uniform fill.
  function wordCountFor(day){
    const seed = Math.sin(day * 12.9898) * 43758.5453;
    const frac = seed - Math.floor(seed);
    return Math.floor(frac * 140) + 5;
  }

  function sizeForWordCount(words){
    const ratio = Math.min(1, Math.log(words + 1) / Math.log(151));
    return 5 + (18 - 5) * ratio;
  }

  async function fillLoop(){
    while (true){
      // reset
      dotEls.forEach(({ dot }) => {
        dot.classList.remove('written');
        dot.style.width = '5px';
        dot.style.height = '5px';
      });
      setStatus('');
      await sleep(700);

      for (const { dot, day } of dotEls){
        setStatus('writing…', { pulse: true });
        await sleep(140 + Math.random() * 90);
        const size = sizeForWordCount(wordCountFor(day));
        dot.classList.add('written');
        dot.style.width = size + 'px';
        dot.style.height = size + 'px';
        setStatus('saved on device');
        await sleep(70);
      }

      setStatus('syncing…', { sage: true, pulse: true });
      await sleep(1000);
      setStatus('synced', { sage: true });
      await sleep(4500);
    }
  }

  fillLoop();
</script>

</body>
</html>
